<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOUND METAMORPHOSIS | ARSENAL REAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        * { box-sizing: border-box; outline: none; }
        body { 
            background: #000; color: #fff; font-family: 'Share+Tech+Mono', monospace; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; width: 100vw; overflow-x: hidden;
        }
        
        .bunker-rack { 
            width: 100%; max-width: 450px; background: #050505; border: 1px solid #1a1a1a; 
            padding: 40px 20px; border-top: 8px solid #ffd700; box-shadow: 0 0 80px #000;
        }

        h1 { font-size: 1.8rem; letter-spacing: 4px; text-align: center; margin: 0 0 30px 0; color: #eee; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 20px; }

        .label { color: #ffd700; font-size: 10px; text-transform: uppercase; margin-top: 25px; display: block; letter-spacing: 2px; }

        select { 
            width: 100%; background: #000; color: #00ff00; border: 1px solid #333; padding: 18px; 
            font-size: 1.1rem; font-family: 'Share+Tech+Mono', monospace; margin-top: 8px; border-radius: 0;
        }

        .price-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .price-box { background: #0a0a0a; border: 1px solid #222; padding: 22px; display: flex; justify-content: space-between; align-items: center; }
        .price-box span { color: #00ff00; font-size: 2rem; font-weight: bold; }

        .btn-master { 
            background: #ff0000; color: #fff; border: none; width: 100%; padding: 25px; 
            font-size: 1.6rem; font-weight: bold; margin-top: 40px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 6px 0 #800; transition: 0.1s;
        }
        .btn-master:active { transform: translateY(4px); box-shadow: none; }

        .footer { font-size: 10px; color: #333; text-align: center; margin-top: 40px; border-top: 1px solid #111; padding-top: 20px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="bunker-rack">
        <h1>SOUND METAMORPHOSIS</h1>
        
        <span class="label">Selector de Artillería (Ingeniería de Élite):</span>
        <select id="engine-select">
            <option>🚀 ARSENAL REAL (AR) - PODER TOTAL</option>
            <option disabled>── METAL (JORDISON/LOMBARDO) ──</option>
            <option>🔥 THRASH METAL (ATAQUE & EQ)</option>
            <option>💀 DEATH METAL (LOW-END & BODY)</option>
            <option>🌑 BLACK METAL (RAW & COLD)</option>
            <option>⚙️ NU METAL (GROOVE PUNCH)</option>
            <option>🎸 HEAVY METAL (CALOR VALVULAR)</option>
            <option disabled>── METAMORFOSIS DEL ROCK ──</option>
            <option>🎸 ROCK URBANO (CLARIDAD)</option>
            <option>🌌 ROCK LATINO (SODA-CAIFANES)</option>
            <option>⛓️ POST PUNK (ACERO & REVERB)</option>
            <option>⚡ HARD ROCK (GAIN STUDIO)</option>
            <option>🎹 BLUES & JAZZ (HI-FI FIDELITY)</option>
        </select>

        <span class="label">Logística de Inversión:</span>
        <div id="pricing-module" class="price-grid"></div>

        <button class="btn-master" onclick="alert('SUBIENDO TRACK... MANDO DE AUTOR ACTIVADO.')">SUBIR TRACK | TEST</button>

        <div class="footer">
            <span>MANDO_AUTOR_v3.8</span>
            <span>DIAMOND_VIBE: ON</span>
            <span>SECURE_ID: SM-GOLD</span>
        </div>
    </div>

    <script>
        const pricing = document.getElementById('pricing-module');
        // LOGÍSTICA EXACTA PACTADA HOY: CERO ERRORES
        if (!navigator.language.includes('es-MX')) {
            // GRINGOS: 1($20), 5($50), 8($80) USD
            pricing.innerHTML = `
                <div class="price-box">1 SINGLE TRACK <span>$20 USD</span></div>
                <div class="price-box">5 TRACK PACK <span>$50 USD</span></div>
                <div class="price-box">8 TRACK ALBUM <span>$80 USD</span></div>
            `;
        } else {
            // MÉXICO: 1($200), 6($500), 8($850) MXN
            pricing.innerHTML = `
                <div class="price-box">1 CANCIÓN <span>$200 MXN</span></div>
                <div class="price-box">6 CANCIONES <span>$500 MXN</span></div>
                <div class="price-box">8 CANCIONES <span>$850 MXN</span></div>
            `;
        }
    </script>
</body>
</html>
