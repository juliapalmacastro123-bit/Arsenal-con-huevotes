<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL ARSENAL | THE ULTIMATE ROCK & METAL BUNKIER</title>
    <style>
        :root { --sangre: #8b0000; --oro: #d4af37; --exito: #2ecc71; --mp: #009ee3; --bulbo: #ff4500; }
        body { 
            background: #000; color: #666; font-family: 'Impact', sans-serif; text-align: center; padding: 10px;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            user-select: none; -webkit-user-select: none;
        }
        .bunker-arsenal { 
            max-width: 1250px; margin: 10px auto; background: #080808; border: 6px solid #222; 
            padding: 40px; border-top: 20px solid var(--sangre); position: relative;
            box-shadow: 0 0 300px #000;
        }
        h1 { color: #fff; font-size: 5.5rem; margin: 0; letter-spacing: -4px; text-transform: uppercase; text-shadow: 0 0 40px var(--sangre); }
        .slogan { color: var(--oro); font-size: 1.4rem; letter-spacing: 12px; margin-bottom: 30px; }

        /* CONSOLA DE PRESETS ACTUALIZADA */
        .preset-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            margin-bottom: 35px; background: #111; padding: 25px; border: 2px solid #333; border-radius: 8px;
        }
        .btn-p { 
            background: #050505; border: 1px solid #444; color: #888; padding: 15px 5px; 
            font-size: 10px; cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn-p:hover, .btn-p.active { border-color: var(--oro); color: #fff; background: #1a1a1a; box-shadow: 0 0 15px var(--oro); }
        .btn-aic { border: 1px solid var(--sangre); color: #aaa; } /* Estilo Alice in Chains */

        /* RACKS ANALÓGICOS */
        .studio-rack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .unit { background: linear-gradient(180deg, #151515, #000); border: 2px solid #333; padding: 20px; text-align: left; position: relative; }
        .unit h4 { color: #aaa; font-size: 10px; margin: 0 0 15px 0; border-bottom: 1px solid var(--sangre); text-transform: uppercase; letter-spacing: 2px; }
        
        .valve { width: 14px; height: 30px; background: var(--bulbo); border-radius: 15px 15px 4px 4px; display: inline-block; opacity: 0.7; box-shadow: 0 0 20px var(--bulbo); animation: glow 2s infinite alternate; }
        @keyframes glow { from { opacity: 0.3; } to { opacity: 1; } }

        .knob { width: 50px; height: 50px; border: 3px solid #333; border-radius: 50%; background: radial-gradient(circle, #222, #000); position: relative; margin: 10px auto; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .knob::before { content: ''; position: absolute; top: 6px; left: 50%; width: 3px; height: 14px; background: var(--oro); transform: translateX(-50%); }

        .master-console { background: #050505; border: 4px solid #1a1a1a; padding: 50px; border-radius: 12px; box-shadow: inset 0 0 100px #000; }
        .btn-ignite { 
            background: linear-gradient(180deg, #444, #111); color: #fff; width: 100%; padding: 30px; 
            border: 3px solid #555; font-size: 2.2rem; cursor: pointer; letter-spacing: 12px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--oro);
        }

        .privacy-shield { background: rgba(139,0,0,0.1); border: 1px solid #500; padding: 25px; font-size: 12px; color: #999; margin: 30px 0; text-align: justify; line-height: 1.7; }

        .pay-terminal { background: #0d0d0d; border: 2px solid #222; padding: 35px; margin-top: 30px; border-radius: 8px; }
        .btn-mp { background: var(--mp); color: #fff; text-decoration: none; padding: 20px 60px; display: inline-block; border-radius: 6px; font-weight: bold; font-size: 1.3rem; }

        #output-zone { margin-top: 50px; display: none; }
        audio { width: 100%; filter: invert(1) brightness(1.5); margin: 30px 0; }
        .dl-final { color: var(--exito); border: 4px solid var(--exito); padding: 25px 60px; text-decoration: none; font-weight: bold; font-size: 1.8rem; text-transform: uppercase; display: inline-block; }

        #erick-key { position: absolute; bottom: 20px; right: 20px; width: 60px; opacity: 0.01; fill: #fff; cursor: pointer; transition: 5s; z-index: 1000; }
        #erick-key.active { opacity: 0.9; fill: var(--exito); }
    </style>
</head>
<body oncontextmenu="return false">

<div class="bunker-arsenal">
    <h1>EL ARSENAL</h1>
    <div class="slogan">THE ANALOG ROCK & METAL HIERARCHY</div>

    <div class="preset-grid">
        <button class="btn-p" onclick="tune('Blues', 30, 20)">Blues</button>
        <button class="btn-p" onclick="tune('Classic Rock', 60, 40)">Classic Rock</button>
        <button class="btn-p" onclick="tune('Hard Rock', 95, 85)">Hard Rock</button>
        <button class="btn-p btn-aic" onclick="tune('Grunge AIC', 185, 160)">Grunge (Alice in Chains)</button>
        <button class="btn-p" onclick="tune('Heavy Metal', 140, 110)">Heavy Metal</button>
        <button class="btn-p" onclick="tune('Thrash Metal', 180, 150)">Thrash Metal</button>
        <button class="btn-p" onclick="tune('Death Metal', 225, 195)">Death Metal</button>
        <button class="btn-p" onclick="tune('Black Metal', 255, 205)">Black Metal</button>
        <button class="btn-p" onclick="tune('Ska Punk', 45, 125)">Ska Punk</button>
        <button class="btn-p" onclick="tune('Rock Urbano', 115, 135)">Rock Urbano</button>
        <button class="btn-p" onclick="tune('Nu Metal', 165, 215)">Nu Metal</button>
        <button class="btn-p" onclick="tune('Indie Alt', 40, 65)">Indie Alt</button>
    </div>

    <div class="studio-rack">
        <div class="unit"><h4>NEVE TUBE GAIN</h4><div class="valve"></div><div class="knob" id="k1"></div></div>
        <div class="unit"><h4>CL 1B COMPRESSOR</h4><div class="valve"></div><div class="valve"></div><div class="knob" id="k2"></div></div>
        <div class="unit"><h4>MANLEY ELITE EQ</h4><div class="valve"></div><div class="knob" id="k3"></div></div>
    </div>

    <div class="master-console">
        <input type="file" id="fIn" accept="audio/*" style="margin-bottom:30px; display:block; margin:auto;">
        <button class="btn-ignite" onclick="fire()">ENCENDER ESTUDIO</button>
        <div id="output-zone">
            <audio id="player" controls controlsList="nodownload"></audio>
            <div id="dl-box" style="display:none;"><a id="dl-l" class="dl-final">📥 DESCARGAR MÁSTER DIAMANTE</a></div>
        </div>
    </div>

    <div class="privacy-shield">
        🛡️ <b>PRIVACIDAD EL ARSENAL:</b> Procesamiento en RAM local. Cero almacenamiento externo. Tu música es tuya.
    </div>

    <div class="pay-terminal">
        <a href="TU_LINK_DE_PAGO" target="_blank" class="btn-mp">PAGAR Y LIBERAR SESIÓN</a>
    </div>

    <svg id="erick-key" viewBox="0 0 512 512" onmousedown="s()" onmouseup="e()"><path d="M256 0L193.5 193.5H0L156.7 307.3L94.3 512L256 386.4L417.7 512L355.3 307.3L512 193.5H318.5L256 0Z"/></svg>
</div>

<script>
    let ok = false, t;
    window.onload = () => { if(new URLSearchParams(window.location.search).get('status')==='approved') unlock(); };

    function tune(n, r1, r2) {
        document.querySelectorAll('.btn-p').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('k1').style.transform = `rotate(${r1}deg)`;
        document.getElementById('k2').style.transform = `rotate(${r2}deg)`;
        document.getElementById('k3').style.transform = `rotate(${(r1+r2)/2.1}deg)`;
    }

    function fire() {
        const f = document.getElementById('fIn').files[0];
        if(!f) return alert("SISTEMA: Carga el archivo.");
        const p = document.getElementById('player');
        p.src = URL.createObjectURL(f);
        document.getElementById('output-zone').style.display = 'block';
        if(ok) document.getElementById('dl-box').style.display = 'block';
        p.play();
        p.ontimeupdate = () => { if(!ok && p.currentTime >= 90) { p.pause(); p.currentTime = 0; alert("SISTEMA: Paga para liberar la sesión completa."); } };
        document.getElementById('dl-l').href = p.src;
        document.getElementById('dl-l').download = "MASTER_ARSENAL_" + f.name;
    }

    function unlock() { ok = true; document.getElementById('dl-box').style.display = 'block'; }
    function s() { t = setTimeout(() => { unlock(); document.getElementById('erick-key').classList.add('active'); alert("MAESTRO ERICK"); }, 3000); }
    function e() { clearTimeout(t); }
</script>
</body>
</html>
