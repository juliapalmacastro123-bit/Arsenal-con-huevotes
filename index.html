<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUND METAMORPHOSIS - EL ARSENAL</title>
    <style>
        /* ESTÉTICA DE METAL PULIDO Y ROCK PESADO */
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        #consola-bunker {
            border: 5px solid #444;
            background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 50px #000, inset 0 0 20px #222;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        .pantalla-plasma {
            background: #001a33;
            border: 3px solid #333;
            padding: 15px;
            color: #00d4ff;
            text-shadow: 0 0 10px #00d4ff;
            margin-bottom: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .vu-meter {
            height: 10px;
            background: #222;
            margin: 5px 0;
            position: relative;
        }

        .vu-bar {
            height: 100%;
            background: linear-gradient(to right, green, yellow, red);
            width: 70%;
        }

        .precios-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .paquete {
            border: 2px solid #555;
            padding: 15px;
            background: #111;
        }

        .paquete:hover {
            border-color: #00d4ff;
            background: #151515;
        }

        input[type="text"] {
            background: #000;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px;
            width: 80%;
            text-align: center;
        }

        .boton-disparo {
            background: #b30000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .boton-disparo:hover { background: #ff0000; }

        #aviso-privacidad {
            font-size: 10px;
            color: #666;
            margin-top: 30px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div id="consola-bunker">
    <h1 style="letter-spacing: 5px;">SOUND METAMORPHOSIS</h1>
    
    <div class="pantalla-plasma">
        <div id="status">UNIDAD EN STANDBY...</div>
        <div class="vu-meter"><div class="vu-bar"></div></div>
        <div id="parche-info">PATCH: QUIRÚRGICO ACTIVADO</div>
    </div>

    <div id="ui-clientes">
        <h3 id="txt-selecciona">SELECCIONA TU ARTILLERÍA:</h3>
        <div class="precios-container" id="lista-precios">
            </div>
        
        <input type="text" id="llave-vip" placeholder="INGRESA TU CÓDIGO DE ACCESO">
        <br>
        <button class="boton-disparo" onclick="procesar()">DISPARAR METAMORFOSIS</button>
    </div>

    <div id="aviso-privacidad">
        AVISO: EL ARSENAL NO RETIENE ARCHIVOS. TU MÚSICA ES TUYA. AL TERMINAR EL PROCESO, TODO SE BORRA. 
        <br> NO COPY, NO LOGS. ONLY METAL.
    </div>
</div>

<script>
    // LLAVE MAESTRA SLAYER
    const LLAVE_MAESTRA = "slayer 38 666";
    
    // DETECCIÓN DE UBICACIÓN Y PRECIOS
    function configurarArsenal() {
        const pContainer = document.getElementById('lista-precios');
        // Simulación de detección IP (Esto se puede conectar a una API de IP)
        const isGringo = false; // El motor de GH lo detecta por zona

        if(isGringo) {
            pContainer.innerHTML = `
                <div class="paquete">1 TRACK<br>$15 USD</div>
                <div class="paquete">6 TRACKS (EP)<br>$40 USD</div>
                <div class="paquete">8 TRACKS (LP)<br>$65 USD</div>
            `;
            document.getElementById('txt-selecciona').innerText = "SELECT YOUR ARTILLERY:";
        } else {
            pContainer.innerHTML = `
                <div class="paquete">1 ROLA<br>$200 MXN</div>
                <div class="paquete">6 ROLAS (EP)<br>$500 MXN</div>
                <div class="paquete">8 ROLAS (LP)<br>$850 MXN</div>
            `;
        }
    }

    function procesar() {
        const llave = document.getElementById('llave-vip').value;
        const status = document.getElementById('status');
        
        if(llave === LLAVE_MAESTRA) {
            status.innerText = "ACCESO VIP: BIENVENIDO AL ARSENAL, ERICK";
            status.style.color = "#ff0000";
            alert("LLAVE MAESTRA ACEPTADA. MODO ADMINISTRADOR ACTIVO.");
        } else {
            status.innerText = "PROCESANDO PAGO Y METAMORFOSIS...";
            // Aquí iría el disparo a Telegram
        }
    }

    configurarArsenal();
</script>

</body>
</html>
