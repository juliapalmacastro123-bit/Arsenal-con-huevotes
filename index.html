<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARSENAL | SOUND METAMORPHOSIS</title>
    <style>
        :root { --red: #ff0000; --gold: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-transform: uppercase; text-align: center; }
        .bunker-rack { max-width: 1000px; margin: 0 auto; background: #1a1a1a; border: 5px solid #333; border-radius: 12px; box-shadow: 0 0 60px rgba(255, 0, 0, 0.4); padding: 20px; }
        h1 { font-size: 3rem; color: var(--red); margin: 10px 0; letter-spacing: -2px; }
        .lcd-monitor { background: #050505; border: 2px solid #222; padding: 15px; color: #0f0; font-family: 'Consolas', monospace; text-align: left; margin-bottom: 20px; border-radius: 4px; font-size: 0.8rem; min-height: 80px; border-left: 5px solid var(--red); }
        .module-box { background: #080808; padding: 15px; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 8px; }
        input[type="file"] { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; }
        .detonate-btn { width: 100%; background: #150000; border: 4px solid var(--red); color: var(--red); font-size: 1.5rem; padding: 20px; opacity: 0.2; font-weight: bold; }
        .detonate-btn.active { opacity: 1; background: var(--red); color: #000; box-shadow: 0 0 30px var(--red); cursor: pointer; }
        
        /* PENTAGRAMA DE ACCESO */
        .pentagram { margin-top: 30px; opacity: 0.2; width: 80px; cursor: pointer; transition: 0.3s; display: inline-block; }
        .pentagram:active { opacity: 1; transform: scale(1.1); }
        .pentagram svg { fill: var(--red); }
    </style>
</head>
<body>

<div class="bunker-rack">
    <h1>EL ARSENAL</h1>

    <div class="lcd-monitor" id="log-screen">> SYSTEM_READY: ESPERANDO SEÑAL...</div>

    <div class="module-box">
        <label>1. CARGAR TRACK (METRALLA)</label>
        <input type="file" id="trackUpload">
    </div>
    
    <button id="finalDetonator" class="detonate-btn" disabled>DETONAR MÁSTER</button>

    <div class="pentagram" onclick="abrirBunker()">
        <svg viewBox="0 0 512 512">
            <path d="M512 256C512 397.4 397.4 512 256 512C114.6 512 0 397.4 0 256C0 114.6 114.6 0 256 0C397.4 0 512 114.6 512 256zM170.5 416.7L256 373.1L341.5 416.7L324.4 324.4L393.1 258.9L299.1 245.8L256 163.6L212.9 245.8L118.9 258.9L187.6 324.4L170.5 416.7z"/>
        </svg>
    </div>
</div>

<script>
    const CLOUD_NAME = "dly8p5r9x";
    const UPLOAD_PRESET = "ml_default";
    const screen = document.getElementById('log-screen');

    function abrirBunker() {
        const p = prompt("LLAVE MAESTRA:");
        if(p === "Abre esta m***** 666") {
            const btn = document.getElementById('finalDetonator');
            btn.disabled = false;
            btn.classList.add('active');
            btn.onclick = () => detonar();
            screen.innerHTML = "> GOD_MODE_ACTIVE: SALUDOS, ERICK.<br>> MOTOR MARSHALL/AMPEG ONLINE.";
            screen.style.color = "#ff0000";
        }
    }

    async function detonar() {
        const file = document.getElementById('trackUpload').files[0];
        if (!file) return alert("SUBE LA ROLA");
        screen.innerHTML += "<br>> METAMORFOSIS EN CURSO...";
        const formData = new FormData();
        formData.append("file", file);
        formData.append("upload_preset", UPLOAD_PRESET);
        try {
            const resp = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: formData });
            const data = await resp.json();
            if (data.secure_url) {
                screen.innerHTML += `<br>> <a href="${data.secure_url}" target="_blank" style="color:#0f0">[ DESCARGAR AQUÍ ]</a>`;
            }
        } catch (e) { screen.innerHTML += "<br>> ERROR."; }
    }
</script>
</body>
</html>
