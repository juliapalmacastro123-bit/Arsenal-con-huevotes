<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOUND METAMORPHOSIS | BÚNKER AR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { background: #000; color: #fff; font-family: 'Share+Tech+Mono', monospace; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .bunker-panel { width: 95%; max-width: 700px; background: #0a0a0a; border: 1px solid #333; padding: 40px; border-top: 5px solid #ff0000; box-shadow: 0 0 60px #000; }
        h1 { font-size: 2rem; letter-spacing: 4px; text-align: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin: 0; text-transform: uppercase; }
        .label { color: #555; font-size: 11px; text-transform: uppercase; margin-top: 25px; display: block; }
        select { width: 100%; background: #000; color: #00ff00; border: 1px solid #444; padding: 15px; font-size: 1.2rem; font-family: 'Share+Tech+Mono', monospace; margin-top: 5px; outline: none; cursor: pointer; }
        .price-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 20px; }
        .package { background: #111; border: 1px solid #333; padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .package:hover { border-color: #ff0000; background: #1a0000; }
        .package span { color: #00ff00; font-size: 1.8rem; font-weight: bold; }
        .btn-action { background: #ff0000; color: #fff; border: none; width: 100%; padding: 25px; font-size: 1.6rem; font-weight: bold; margin-top: 30px; cursor: pointer; box-shadow: 0 5px 0 #800; }
        .footer-tech { font-size: 10px; color: #222; margin-top: 30px; text-align: center; border-top: 1px solid #111; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="bunker-panel">
        <h1>SOUND METAMORPHOSIS</h1>
        
        <span class="label">Hardware Module (Arsenal Real):</span>
        <select>
            <option>🚀 ARSENAL REAL (AR) - MÁXIMO PODER</option>
            <option>🎸 ROCK URBANO / CLARIDAD BARRIO</option>
            <option>🌌 ROCK LATINO (SODA-CAIFANES)</option>
            <option>🤘 HEAVY METAL / QUIRÚRGICO</option>
            <option>⛓️ POST PUNK / ACERO SÓNICO</option>
            <option>⚡ HARD ROCK / CALOR VALVULAR</option>
            <option>🎹 BLUES & JAZZ / FIDELIDAD</option>
        </select>

        <span class="label">Paquetes de Asalto (Logística Detectada):</span>
        <div id="pricing-module" class="price-grid"></div>

        <button class="btn-action">SUBIR TRACK | PRUEBA 90s</button>
        <div class="footer-tech">ENC: AES-256 | CERO_PERILLAS | ELITE_ENGINE</div>
    </div>

    <script>
        const pricing = document.getElementById('pricing-module');
        if (!navigator.language.includes('es-MX')) {
            // LOGÍSTICA GRINGA PROPORCIONAL
            pricing.innerHTML = `
                <div class="package">1 SINGLE TRACK <span>$20 USD</span></div>
                <div class="package">5 TRACK PACK <span>$50 USD</span></div>
                <div class="package">8 TRACK ALBUM <span>$80 USD</span></div>
            `;
        } else {
            // LOGÍSTICA MÉXICO (TU LÓGICA ORIGINAL)
            pricing.innerHTML = `
                <div class="package">1 CANCIÓN <span>$200 MXN</span></div>
                <div class="package">6 CANCIONES <span>$500 MXN</span></div>
                <div class="package">8 CANCIONES <span>$850 MXN</span></div>
            `;
        }
    </script>
</body>
</html>
