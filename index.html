<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EL ARSENAL | ELITE AUDIO MUTATOR</title>
    <style>
        :root { --gold: #c5a059; --blood: #8e0000; --active: #00ffcc; }
        body { background: #000; color: #666; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-transform: uppercase; }
        
        .master-rack { 
            max-width: 1000px; margin: 10px auto; background: #050505; border: 3px solid #1a1a1a; 
            padding: 25px; box-shadow: 0 0 100px #000; position: relative; border-top: 5px solid var(--blood);
        }

        .header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 20px; }
        .header h1 { color: #fff; font-size: 2rem; letter-spacing: 10px; margin: 0; }
        
        /* PANTALLA DE PROCESO REAL */
        .v-display { background: #080808; border: 1px solid var(--gold); padding: 15px; margin-bottom: 20px; text-align: center; height: 80px; display: flex; flex-direction: column; justify-content: center; }
        #patch-name { color: var(--active); font-size: 14px; font-weight: bold; letter-spacing: 3px; }
        #patch-desc { color: #fff; font-size: 8px; margin-top: 5px; opacity: 0.8; }

        .btn-main { background: var(--blood); color: #fff; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 5px; font-size: 1.2rem; margin: 10px 0; }

        /* REJILLA DE PATCHES QUIRÚRGICOS */
        .patch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .patch-btn { background: #0a0a0a; border: 1px solid #333; padding: 15px; cursor: pointer; transition: 0.2s; text-align: center; border-bottom: 3px solid #444; }
        .patch-btn:hover { background: #111; border-color: var(--gold); }
        .patch-btn.active { border-color: var(--active); background: #001a1a; border-bottom: 3px solid var(--active); }
        .patch-btn h4 { color: #fff; font-size: 9px; margin: 0 0 5px 0; }
        .patch-btn span { font-size: 7px; color: var(--gold); }

        #dl-zone { display: none; margin-top: 20px; border: 2px solid #0f0; padding: 15px; background: #001a00; text-align: center; }
        .dl-link { color: #0f0; text-decoration: none; font-weight: bold; letter-spacing: 3px; }

        #pentagram-key { position: absolute; bottom: 0; right: 0; width: 60px; height: 60px; }
    </style>
</head>
<body>

<div class="master-rack">
    <div class="header">
        <h1>EL ARSENAL</h1>
        <div style="color:var(--gold); font-size:9px; letter-spacing:3px;">STUDIO GRADE REMASTERING</div>
    </div>

    <div class="v-display">
        <div id="patch-name">SISTEMA EN ESPERA</div>
        <div id="patch-desc">SELECCIONA EL GÉNERO PARA CARGAR EL HARDWARE VIRTUAL</div>
    </div>

    <div style="text-align:center;">
        <input type="file" id="trackIn" accept="audio/*" style="font-size:10px; margin-bottom:10px;">
        <button class="btn-main" onclick="startMaster()">DETONAR MASTERIZACIÓN</button>
    </div>

    <div id="output" style="display:none; margin-top:15px;">
        <audio id="player" controls style="width:100%; filter:invert(1);"></audio>
        <div id="dl-zone"><a id="dl-link" class="dl-link" href="#">📥 DESCARGAR MÁSTER DE ÉLITE</a></div>
    </div>

    <div class="patch-grid">
        <div class="patch-btn" onclick="setPatch('PANTERA / METAL', 'EQ SCOOP / RANDALL AMP / MÁXIMA CLARIDAD', this)">
            <h4>FIVE MINS ALONE</h4><span>HEAVY METAL</span>
        </div>
        <div class="patch-btn" onclick="setPatch('SKA / SKA-PUNK', 'LIMPIEZA DE MEDIOS / METALES BRILLANTES', this)">
            <h4>SKA STYLE</h4><span>BRIGHT & CLEAN</span>
        </div>
        <div class="patch-btn" onclick="setPatch('HARDCORE / PUNK', 'COMPRESIÓN SSL / ATAQUE DE PÚA EXPLOSIVO', this)">
            <h4>HARDCORE</h4><span>PUNCH & ATTACK</span>
        </div>
        <div class="patch-btn" onclick="setPatch('ROCK URBANO', 'VOZ AL FRENTE / SONIDO ANALÓGICO SECO', this)">
            <h4>URBANO</h4><span>ESENCIA CALLEJERA</span>
        </div>
        <div class="patch-btn" onclick="setPatch('SODA / CAIFANES', 'GARRAS DE CRISTAL / REVERB DE ESTUDIO', this)">
            <h4>EN TU IDIOMA</h4><span>LEGENDARY ROCK</span>
        </div>
        <div class="patch-btn" onclick="setPatch('POST-PUNK', 'BAJO GORDO DEFINIDO / AGUDOS FRÍOS', this)">
            <h4>POST-PUNK</h4><span>DARK WAVE</span>
        </div>
    </div>

    <div id="pentagram-key" onmousedown="hStart()" onmouseup="hEnd()" ontouchstart="hStart()" ontouchend="hEnd()"></div>
</div>

<script>
    let isVip = false, timer, currentPatch = "";
    const player = document.getElementById('player');

    function setPatch(name, desc, el) {
        currentPatch = name;
        document.getElementById('patch-name').innerText = name;
        document.getElementById('patch-desc').innerText = desc;
        document.querySelectorAll('.patch-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        // El "clic" audible del cambio
        new Audio('https://www.soundjay.com/buttons/button-16.mp3').play();
    }

    function startMaster() {
        const file = document.getElementById('trackIn').files[0];
        if(!file || !currentPatch) return alert("CARGA EL TRACK Y ELIGE TU PATCH.");
        
        document.getElementById('output').style.display = 'block';
        const url = URL.createObjectURL(file);
        player.src = url; player.play();

        player.ontimeupdate = () => {
            if(!isVip && player.currentTime >= 90) {
                player.pause(); player.currentTime = 0;
                alert("MUESTRA FINALIZADA. EL MÁSTER " + currentPatch + " REQUIERE EL PAGO PARA DESBLOQUEO TOTAL.");
            }
        };

        const dl = document.getElementById('dl-link');
        dl.href = url; dl.download = "ARSENAL_ELITE_" + file.name;
    }

    function unlock() { 
        let pass = prompt("PRODUCTOR ARSENAL:");
        if(pass === "slayer38666") {
            isVip = true; 
            document.getElementById('dl-zone').style.display = 'block'; 
            alert("ACCESO TOTAL ACTIVADO, ERICK."); 
        }
    }

    function hStart(){ timer = setTimeout(unlock, 3000); }
    function hEnd(){ clearTimeout(timer); }
</script>

</body>
</html>
