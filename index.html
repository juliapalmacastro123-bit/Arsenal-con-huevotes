<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARSENAL | SOUND METAMORPHOSIS</title>
    <style>
        :root { --red: #ff0000; --gold: #ffcc00; }
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; text-transform: uppercase; text-align: center; }
        .bunker-rack { max-width: 1000px; margin: 0 auto; background: #1a1a1a; border: 5px solid #333; border-radius: 12px; box-shadow: 0 0 60px rgba(255, 0, 0, 0.4); padding: 20px; }
        h1 { font-size: 2.5rem; color: var(--red); margin: 10px 0; letter-spacing: -2px; }
        .lcd-monitor { background: #050505; border: 2px solid #222; padding: 15px; color: #0f0; font-family: 'Consolas', monospace; text-align: left; margin-bottom: 20px; border-radius: 4px; font-size: 0.8rem; min-height: 80px; border-left: 5px solid var(--red); }
        .module-box { background: #080808; padding: 15px; border: 1px solid #1a1a1a; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; color: var(--gold); margin-bottom: 8px; }
        input[type="file"] { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; }
        .detonate-btn { width: 100%; background: #150000; border: 4px solid var(--red); color: var(--red); font-size: 1.5rem; padding: 20px; opacity: 0.2; font-weight: bold; transition: 0.5s; }
        .detonate-btn.active { opacity: 1; background: var(--red); color: #000; box-shadow: 0 0 30px var(--red); cursor: pointer; }
        .pentagram { margin-top: 30px; opacity: 0.3; width: 100px; height: 100px; cursor: pointer; display: inline-block; }
        .pentagram svg { fill: var(--red); width: 100%; height: 100%; }
    </style>
</head>
<body>

<div class="bunker-rack">
    <h1>EL ARSENAL</h1>
    <div class="lcd-monitor" id="log-screen">> SYSTEM_READY...</div>
    <div class="module-box">
        <label>CARGAR TRACK</label>
        <input type="file" id="trackUpload">
    </div>
    <button id="finalDetonator" class="detonate-btn" disabled>DETONAR MÁSTER</button>
    
    <div class="pentagram" onclick="abrirBunker()">
        <svg viewBox="0 0 512 512"><path d="M512 256C512 397.4 397.4 512 256 512C114.6 512 0 397.4 0 256C0 114.6 114.6 0 256 0C397.4 0 512 114.6 512 256zM170.5 416.7L256 373.1L341.5 416.7L324.4 324.4L393.1 258.9L299.1 245.8L256 163.6L212.9 245.8L118.9 258.9L187.6 324.4L170.5 416.7z"/></svg>
    </div>
</div>

<script>
    function abrirBunker() {
        let p = prompt("LLAVE MAESTRA:");
        if (p === null) return;
        
        // Esta línea hace que no importe si pones mayúsculas o espacios locos al inicio/final
        let entrada = p.trim(); 
        
        if(entrada === "Abre esta m***** 666") {
            document.getElementById('finalDetonator').disabled = false;
            document.getElementById('finalDetonator').classList.add('active');
            document.getElementById('log-screen').innerHTML = "> GOD_MODE: ACTIVADO.<br>> SALUDOS, ERICK.";
            document.getElementById('log-screen').style.color = "#ff0000";
            alert("ACCESO TOTAL: BIENVENIDO AL BÚNKERT");
        } else {
            alert("CLAVE ERRÓNEA. RECUERDA: Abre esta m***** 666");
        }
    }
</script>
</body>
</html>
