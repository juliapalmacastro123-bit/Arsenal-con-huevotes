name: Sistema Unificado Arsenal

on:
  schedule:
    # 10:00 AM y 6:00 PM (Hora CDMX)
    - cron: '0 16,0 * * *'
  workflow_dispatch: # Botón de pánico/disparo manual

jobs:
  operacion_total:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Librerias
        run: pip install pyTelegramBotAPI
      - name: Ejecutar Arsenal Total
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python arsenal_total.py
        
